version: '3'
rpc:
    listen: 'tcp://127.0.0.1:6001'
server:
    command: 'php src/backend/app.php'
    relay: pipes
http:
    address: '127.0.0.1:8000'
    middleware:
        - gzip
    pool:
        num_workers: 1
        supervisor:
            max_worker_memory: 100
jobs:
    pool:
        num_workers: 2
        max_worker_memory: 100
    consume: {  }
kv:
    local:
        driver: memory
        config:
            interval: 60
metrics:
    address: '127.0.0.1:2112'
